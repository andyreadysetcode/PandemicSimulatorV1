<!DOCTYPE html>
<html>
  <head>
    <title>Pandemic Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  </head>
  <body>
    <body>
      <div style="background: white; padding: 10px; font-family: sans-serif;">
      <label>Simulation Speed: </label>
      <input type="range" id="speedSlider" min="1" max="60" value="30">
      <label>Virus Mortality Speed: </label>
      <input type="range" id="deathSlider" min="0" max="500" value="250">
      <button onclick="resetSim()" style="padding: 5px; margin-left: 10px;">Restart Simulation</button>
      </div>
    <main></main>
    <script src="index.js"></script>
  </body>
</html>
